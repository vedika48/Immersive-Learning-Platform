<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Language Learning</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="three.module.js"></script>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body>
    <header id="navbar">
        <nav>
            <a href="index.html" class="logo">Language Learn</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="signup.html" class="signup-btn">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="wordContainer"></div>

        <div id="startScreen" class="active"></div>
        
        <section id="hero">
            <div class="hero-content">
                <h1>Learn Languages in VR/AR</h1>
                <p>Experience the future of education with our immersive language learning platform.</p>
                <button id="start-button">Get Started</button>
            </div>
        </section>

        <div id="cuboid-screen" class="hidden">
            <div id="cuboid-container"></div>
        </div>

        <div id="word-group-screen" class="hidden">
            <div id="wordDisplay"></div>
            <input id="user-input" type="text" style="display:none;">
            <button id="repeat-button" class="hidden">Repeat Word</button>
        </div>
        <div id="progress-bar-container" style="display: none;">
            <div id="progress-bar" style="width: 0%; height: 20px; background-color: green;"></div>
        </div>  
          
        <button id="skip-button" style="position: absolute; bottom: 20px; right: 20px; display: none;">
            Skip
        </button>
        <button id="speakButton">Speak</button>
        <button id="submitButton" style="display: none;">Submit</button>
    </main>

    <footer id="footer">
        <p>© 2024 Immersive Language Learning</p>
    </footer>

    <script>
        // Redirect to choose.html when Get Started is clicked
        document.getElementById("start-button").addEventListener("click", function() {
            window.location.href = "choose.html";
        });
    </script>
</body>
</html>
